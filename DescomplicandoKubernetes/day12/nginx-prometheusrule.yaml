---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nginx-prometheus-rule
  namespace: monitoring
  labels:
    prometheus: k8s
    role: alert-rules
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
spec:
  groups:
    - name: nginx-prometheus-rules
      rules:
        - alert: NginxDown
          expr: nginx_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Nginx is Down"
            description: "The Nginx server is not responding to metrics requests for more than 1 minute."
        - alert: NginxHightRequestRate
          expr: rate(nginx_http_requests_total{job="nginx"}[5m]) > 10
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High Request Rate on Nginx"
            description: "The Nginx server is receiving more than 10 requests per second on average over the last 5 minutes."
...