---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }
        location /metrics {
            stub_status on;
            access_log off;
        }
    }

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx-pod
spec:
  containers:
    - name: nginx
      image: nginx
      resources:
        limits:
          cpu: "0.5"
          memory: 128Mi
        requests:
          cpu: "0.25"
          memory: 64Mi
      ports:
        - containerPort: 80
          name: http
      volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
    - name: nginx-exporter
      image: nginx/nginx-prometheus-exporter:0.11.0
      args:
        - "-nginx.scrape-uri=http://localhost/metrics"
      resources:
        limits:
          cpu: "0.3"
          memory: 128Mi
        requests:
          cpu: "0.25"
          memory: 64Mi
      ports:
        - containerPort: 9113
          name: metrics
  volumes:
    - configMap:
        defaultMode: 420
        name: nginx-config
      name: nginx-config
...